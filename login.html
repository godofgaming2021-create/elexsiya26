<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.qrserver.com; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com;">
    <title>Participant Login - Elexsiya 26</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --emirates-red: #C60C30;
            --emirates-gold: #D4AF37;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            color: var(--emirates-red);
            font-size: 1.8rem;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--emirates-red);
            box-shadow: 0 0 0 4px rgba(198, 12, 48, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--emirates-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #a50a28;
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--emirates-red);
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: 0.2s;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--emirates-red);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div style="text-align: left;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
        <a href="index.html" class="logo">ELEXSIYA 26</a>
        <h2>Participant Portal</h2>
        <form id="partLoginForm">
            <div class="form-group">
                <label>Gmail Address</label>
                <input type="email" id="email" placeholder="registered-email@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number (Password)</label>
                <input type="tel" id="phone" placeholder="As used in registration" required>
            </div>
            <button type="submit" class="btn-login" id="loginSubmit">Login to Portal</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
        <div id="chessLoginPrompt" style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <p style="font-size:0.85rem; color:var(--text-muted); cursor:pointer;" onclick="toggleChessMode()"
                id="toggleText">
                ♟️ Chess Participant? <span style="color:var(--emirates-red); font-weight:700;">Login here</span>
            </p>
        </div>
        <p style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted);">
            Need help? Contact the symposium treasurer.
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        let isChessMode = false;
        function toggleChessMode() {
            isChessMode = !isChessMode;
            const h2 = document.querySelector('h2');
            const btn = document.getElementById('loginSubmit');
            const toggle = document.getElementById('toggleText');

            if (isChessMode) {
                h2.textContent = "♟️ Chess Participant Portal";
                btn.textContent = "Enter Chess ♟️ Portal";
                toggle.innerHTML = "🔙 Regular Participant? <span style='color:var(--emirates-red); font-weight:700;'>Login here</span>";
                document.querySelector('.login-card').style.borderColor = "#000";
            } else {
                h2.textContent = "Participant Portal";
                btn.textContent = "Login to Portal";
                toggle.innerHTML = "♟️ Chess Participant? <span style='color:var(--emirates-red); font-weight:700;'>Login here</span>";
                document.querySelector('.login-card').style.borderColor = "transparent";
            }
        }

        document.getElementById('partLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginSubmit');
            const error = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();

            const now = Date.now();
            const lastAttempt = parseInt(localStorage.getItem('lastPartLoginAttempt') || '0');
            const attemptCount = parseInt(localStorage.getItem('partLoginAttempts') || '0');

            if (attemptCount >= 5 && now - lastAttempt < 60000) {
                error.textContent = 'Too many failed attempts. Please try again in 1 minute.';
                error.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            error.style.display = 'none';

            try {
                // Query Firestore for matching registration
                const snap = await db.collection('registrations')
                    .where('email', '==', email)
                    .where('phone', '==', phone)
                    .get();

                if (snap.empty) {
                    throw new Error('No registration found with these credentials. Please check your data.');
                }

                const userData = snap.docs[0].data();
                if (userData.paymentStatus !== 'Paid') {
                    throw new Error('Your registration is pending payment verification.');
                }

                if (isChessMode && userData.event !== 'Chess') {
                    throw new Error('This portal is strictly for Chess participants.');
                }

                // Generate signature for security (Vuln 24)
                const signature = await _calcChecksum({
                    regId: userData.regId,
                    email: userData.email,
                    event: userData.event,
                    amount: userData.amount,
                    registeredAt: userData.registeredAt
                });

                // Store in session
                sessionStorage.setItem('partUser', JSON.stringify({
                    regId: userData.regId,
                    name: userData.name,
                    event: userData.event,
                    email: userData.email,
                    amount: userData.amount,
                    registeredAt: userData.registeredAt,
                    signature: signature
                }));

                localStorage.removeItem('partLoginAttempts');
                window.location.href = isChessMode ? 'chess_certificate.html' : 'certificate.html';
            } catch (err) {
                localStorage.setItem('lastPartLoginAttempt', now.toString());
                localStorage.setItem('partLoginAttempts', (attemptCount + 1).toString());

                // Generic error for security
                error.textContent = 'Invalid credentials or login failed. Please check your details.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login to Portal';
            }
        });
    </script>
</body>

</html>
