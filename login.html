<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.qrserver.com; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com;">
    <title>Participant Login - Elexsiya 26</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
        
    <!-- Aggressive Cache Clearing Script -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          let swDeleted = false;
          for(let registration of registrations) {
            registration.unregister();
            swDeleted = true;
          }
          if (swDeleted && !window.location.search.includes('nocache=1')) {
            const url = new URL(window.location.href);
            url.searchParams.set('nocache', '1');
            window.location.replace(url.toString());
          }
        });
      }
    </script>
    <style>
        :root {
            --emirates-red: #C60C30;
            --emirates-gold: #D4AF37;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            color: var(--emirates-red);
            font-size: 1.8rem;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--emirates-red);
            box-shadow: 0 0 0 4px rgba(198, 12, 48, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--emirates-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #a50a28;
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--emirates-red);
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: 0.2s;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--emirates-red);
        }

        /* Year picker panel */
        .year-picker {
            display: none;
            text-align: center;
        }
        .year-picker h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .year-picker p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .year-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-year {
            flex: 1;
            padding: 18px 10px;
            border: 2px solid #eee;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .btn-year:hover {
            border-color: var(--emirates-red);
            background: #fff5f7;
            color: var(--emirates-red);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(198,12,48,0.12);
        }
        .year-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div style="text-align: left;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
        <a href="index.html" class="logo">ELEXSIYA 26</a>
        <h2>Participant Portal</h2>
        <form id="partLoginForm">
            <div class="form-group">
                <label>Gmail Address</label>
                <input type="email" id="email" placeholder="registered-email@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number (Password)</label>
                <input type="tel" id="phone" placeholder="As used in registration" required>
            </div>
            <button type="submit" class="btn-login" id="loginSubmit">Login to Portal</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
        <div id="yearPicker" class="year-picker">
            <div style="font-size:2rem; margin-bottom:12px;">🎓</div>
            <h3>Select Your Year of Study</h3>
            <p>This will appear on your participation certificate.</p>
            <div class="year-buttons">
                <button class="btn-year" onclick="selectYear('1st')">
                    <span class="year-icon">1️⃣</span>1st Year
                </button>
                <button class="btn-year" onclick="selectYear('2nd')">
                    <span class="year-icon">2️⃣</span>2nd Year
                </button>
                <button class="btn-year" onclick="selectYear('3rd')">
                    <span class="year-icon">3️⃣</span>3rd Year
                </button>
            </div>
        </div>

        <div id="chessLoginPrompt" style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <p style="font-size:0.85rem; color:var(--text-muted); cursor:pointer;" onclick="toggleChessMode()"
                id="toggleText">
                ♟️ Chess Participant? <span style="color:var(--emirates-red); font-weight:700;">Login here</span>
            </p>
        </div>
        <p style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted);">
            Need help? Contact the symposium treasurer.
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        let isChessMode = false;
        function toggleChessMode() {
            isChessMode = !isChessMode;
            const h2 = document.querySelector('h2');
            const btn = document.getElementById('loginSubmit');
            const toggle = document.getElementById('toggleText');

            if (isChessMode) {
                h2.textContent = "♟️ Chess Participant Portal";
                btn.textContent = "Enter Chess ♟️ Portal";
                toggle.innerHTML = "🔙 Regular Participant? <span style='color:var(--emirates-red); font-weight:700;'>Login here</span>";
                document.querySelector('.login-card').style.borderColor = "#000";
            } else {
                h2.textContent = "Participant Portal";
                btn.textContent = "Login to Portal";
                toggle.innerHTML = "♟️ Chess Participant? <span style='color:var(--emirates-red); font-weight:700;'>Login here</span>";
                document.querySelector('.login-card').style.borderColor = "transparent";
            }
        }

        document.getElementById('partLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginSubmit');
            const error = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();

            const now = Date.now();
            const lastAttempt = parseInt(localStorage.getItem('lastPartLoginAttempt') || '0');
            const attemptCount = parseInt(localStorage.getItem('partLoginAttempts') || '0');

            if (attemptCount >= 5 && now - lastAttempt < 60000) {
                error.textContent = 'Too many failed attempts. Please try again in 1 minute.';
                error.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            error.style.display = 'none';

            try {
                let userData = null;
                let loggedInName = null;

                // ── Phase 1: Try Team Leader login (fast indexed query) ──
                const leaderFetchOp = db.collection('registrations')
                    .where('email', '==', email)
                    .where('phone', '==', phone)
                    .get();
                const leaderFetchTimeout = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('LEADER_FETCH_TIMEOUT')), 10000)
                );
                const leaderSnap = await Promise.race([leaderFetchOp, leaderFetchTimeout]);

                if (!leaderSnap.empty) {
                    userData = leaderSnap.docs[0].data();
                    loggedInName = userData.name; // Leader's own name
                } else {
                    // ── Phase 2: Team Member fallback (scan members arrays) ──
                    // Fetch registrations that have a members array (team registrations)
                    const teamFetchOp = db.collection('registrations')
                        .where('paymentStatus', '==', 'Paid')
                        .get();
                    const teamFetchTimeout = new Promise((_, reject) =>
                        setTimeout(() => reject(new Error('TEAM_FETCH_TIMEOUT')), 12000)
                    );
                    const teamSnap = await Promise.race([teamFetchOp, teamFetchTimeout]);

                    for (const doc of teamSnap.docs) {
                        const reg = doc.data();
                        if (!reg.members || !Array.isArray(reg.members)) continue;
                        // Check each team member's credentials
                        const matchedMember = reg.members.find(m =>
                            (m.email || '').toLowerCase() === email && m.phone === phone
                        );
                        if (matchedMember) {
                            userData = reg; // Use the parent team registration
                            loggedInName = matchedMember.name; // Use THIS member's name
                            break;
                        }
                    }
                }

                if (!userData) {
                    throw new Error('No registration found with these credentials.');
                }

                if (userData.paymentStatus !== 'Paid') {
                    throw new Error('Your registration is pending payment verification.');
                }

                if (isChessMode && userData.event !== 'Chess') {
                    throw new Error('This portal is strictly for Chess participants.');
                }

                // Compute the event string exactly as it will be stored in session
                // so the signature matches on certificate.html verification
                const storedEvent = userData.allEvents || userData.event || 'Elexsiya 26';

                // Generate signature for security (must use storedEvent, not raw userData.event)
                const signature = await _calcChecksum({
                    regId: userData.regId,
                    email: userData.email,
                    event: storedEvent,
                    amount: userData.amount,
                    registeredAt: userData.registeredAt
                });

                // Store in session — use the logged-in member's NAME, but the TEAM's regId
                sessionStorage.setItem('partUser', JSON.stringify({
                    regId: userData.regId,
                    name: loggedInName,       // Individual member's name for their pass
                    event: storedEvent,
                    email: userData.email,    // Leader's email (for signature verification)
                    amount: userData.amount,
                    registeredAt: userData.registeredAt,
                    signature: signature
                }));
                // Store redirect target
                window._certRedirect = isChessMode ? 'chess_certificate.html' : 'certificate.html';

                localStorage.removeItem('partLoginAttempts');

                if (isChessMode) {
                    // Chess doesn't need year — redirect immediately
                    window.location.href = 'chess_certificate.html';
                } else {
                    // Show year picker
                    document.getElementById('partLoginForm').style.display = 'none';
                    document.getElementById('chessLoginPrompt').style.display = 'none';
                    document.querySelector('.login-card p:last-child') && 
                        (document.querySelector('.login-card p:last-child').style.display = 'none');
                    document.getElementById('yearPicker').style.display = 'block';
                }
            } catch (err) {
                localStorage.setItem('lastPartLoginAttempt', now.toString());
                localStorage.setItem('partLoginAttempts', (attemptCount + 1).toString());

                error.textContent = err.message.includes('TIMEOUT')
                    ? 'Connection timed out. Please check your internet and try again.'
                    : 'Invalid credentials or login failed. Please check your details.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = isChessMode ? 'Enter Chess ♟️ Portal' : 'Login to Portal';
            }
        });

        function selectYear(year) {
            sessionStorage.setItem('partYear', year);
            window.location.href = 'certificate.html';
        }
    </script>
</body>

</html>
