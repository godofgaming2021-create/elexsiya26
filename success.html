<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Confirmation – Elexsiya 26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 100px 20px 60px;
            background: var(--bg-warm);
            position: relative;
        }

        .page-wrap::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* ── Receipt Card ── */
        .success-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .05);
            animation: fadeInUp .6s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: inline-block;
            animation: successBounce .8s ease-out;
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-card h1 {
            font-family: var(--font-heading);
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .success-card .success-msg {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 28px;
        }

        /* ── Detail Box ── */
        .detail-box {
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid var(--border-light);
            gap: 12px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: .88rem;
            min-width: 110px;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-dark);
            font-size: .92rem;
            text-align: right;
        }

        .detail-value.reg-id {
            color: var(--emirates-red);
            font-family: var(--font-heading);
            font-size: 1.05rem;
            letter-spacing: 1px;
        }

        /* ── Event Cards ── */
        .events-section {
            margin-bottom: 24px;
            text-align: left;
        }

        .events-section-title {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .event-receipt-card {
            background: #fff;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--emirates-red);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .event-receipt-info {
            flex: 1;
            min-width: 0;
        }

        .event-receipt-name {
            font-weight: 700;
            color: var(--emirates-red);
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .event-receipt-members {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .whatsapp-join-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            transition: background 0.2s, transform 0.2s;
        }

        .whatsapp-join-btn:hover {
            background: #1EB85A;
            transform: translateY(-1px);
        }

        /* ── Save Box ── */
        .save-box {
            background: rgba(200, 169, 81, .06);
            border: 1px solid rgba(200, 169, 81, .25);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .save-box-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--gold-dark);
            font-size: .88rem;
        }

        .save-box p {
            color: var(--text-body);
            font-size: .85rem;
            line-height: 1.7;
        }

        /* ── Action Buttons ── */
        .success-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn-pdf {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            background: rgba(200, 169, 81, .1);
            border: 1px solid rgba(200, 169, 81, .3);
            color: var(--gold-dark);
            border-radius: 50px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-pdf:hover {
            background: rgba(200, 169, 81, .2);
        }

        /* ── Status Banner ── */
        .status-banner {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 22px;
            text-align: center;
        }

        .status-banner.pending {
            background: rgba(217, 119, 6, 0.08);
            border: 1px solid rgba(217, 119, 6, 0.25);
            color: #d97706;
        }

        .status-banner.paid {
            background: rgba(22, 163, 74, 0.08);
            border: 1px solid rgba(22, 163, 74, 0.25);
            color: #16a34a;
        }

        .status-banner.verification {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #6366f1;
        }

        @media (max-width: 560px) {
            .success-card {
                padding: 32px 20px;
            }
        }

        /* ══════════════════════════════════════════
           PRINT / PDF STYLES — Professional A4 Receipt
           ══════════════════════════════════════════ */
        @media print {
            @page {
                margin: 16mm 18mm;
                size: A4 portrait;
            }

            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body {
                background: #fff !important;
                font-family: 'Poppins', Arial, sans-serif;
            }

            .navbar,
            .no-print,
            .success-actions,
            .whatsapp-join-btn,
            .status-banner {
                display: none !important;
            }

            .page-wrap {
                padding: 0 !important;
                min-height: unset !important;
                background: #fff !important;
                display: block !important;
            }

            .page-wrap::before {
                display: none;
            }

            .success-card {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                max-width: 100% !important;
                animation: none !important;
                text-align: left !important;
            }

            /* ── Branded receipt header ── */
            .print-header {
                display: flex !important;
                align-items: stretch;
                margin-bottom: 22px;
                border-radius: 10px;
                overflow: hidden;
            }

            .print-header-bar {
                width: 8px;
                background: #c60c30;
                flex-shrink: 0;
            }

            .print-header-body {
                flex: 1;
                background: #fdf2f4;
                border: 1px solid #f0c6cd;
                border-left: none;
                border-radius: 0 10px 10px 0;
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .print-title {
                font-family: 'Montserrat', Arial, sans-serif;
                font-size: 1.35rem;
                font-weight: 800;
                color: #c60c30;
                letter-spacing: 0.07em;
                text-transform: uppercase;
                line-height: 1.1;
            }

            .print-sub {
                font-size: 0.72rem;
                color: #888;
                margin-top: 4px;
                font-family: 'Poppins', Arial, sans-serif;
            }

            .print-receipt-label {
                font-family: 'Montserrat', Arial, sans-serif;
                font-size: 0.78rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                color: #c60c30;
                text-transform: uppercase;
                text-align: right;
            }

            .print-receipt-date {
                font-size: 0.7rem;
                color: #999;
                margin-top: 4px;
                font-family: 'Poppins', Arial, sans-serif;
            }

            /* Hide on-screen headings; print uses its own header */
            .success-icon,
            .success-card h1,
            .success-card .success-msg {
                display: none !important;
            }

            /* ── Detail table ── */
            .detail-box {
                break-inside: avoid;
                background: #fff !important;
                border: 1px solid #ddd !important;
                border-radius: 8px !important;
                padding: 0 !important;
                overflow: hidden;
                margin-bottom: 18px !important;
            }

            .detail-box .print-section-title {
                display: block !important;
                background: #c60c30;
                color: #fff;
                font-family: 'Montserrat', Arial, sans-serif;
                font-size: 0.7rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                padding: 7px 16px;
            }

            .detail-row {
                padding: 8px 16px !important;
                border-bottom: 1px solid #f0f0f0 !important;
            }

            .detail-row:last-child {
                border-bottom: none !important;
            }

            .detail-label {
                color: #777 !important;
                font-size: 0.8rem !important;
            }

            .detail-value {
                font-size: 0.88rem !important;
                color: #111 !important;
            }

            .detail-value.reg-id {
                color: #c60c30 !important;
                font-size: 1rem !important;
            }

            /* ── Events section ── */
            .events-section-title {
                color: #c60c30 !important;
                font-size: 0.68rem !important;
                letter-spacing: 0.1em !important;
            }

            .event-receipt-card {
                break-inside: avoid;
                background: #fff !important;
                border: 1px solid #e0e0e0 !important;
                border-left: 4px solid #c60c30 !important;
                border-radius: 8px !important;
                padding: 10px 14px !important;
                margin-bottom: 8px !important;
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
            }

            .event-receipt-name {
                color: #c60c30 !important;
                font-size: 0.88rem !important;
            }

            .event-receipt-members {
                font-size: 0.76rem !important;
            }

            /* WhatsApp: show URL text, hide button */
            .whatsapp-join-btn {
                display: none !important;
            }

            .whatsapp-section-print {
                display: block !important;
                font-size: 0.7rem;
                color: #2a7a4a;
                margin-top: 4px;
                word-break: break-all;
                font-style: italic;
            }

            /* ── Save box ── */
            .save-box {
                break-inside: avoid;
                background: #fffbea !important;
                border: 1px solid #e8cc6a !important;
                border-radius: 8px !important;
            }

            /* ── Print footer ── */
            .print-footer {
                display: block !important;
                margin-top: 28px;
                padding-top: 12px;
                border-top: 2px solid #c60c30;
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                font-size: 0.68rem;
                color: #aaa;
            }

            /* Watermark */
            .success-card::after {
                content: 'ELEXSIYA 26';
                position: fixed;
                bottom: 40%;
                right: -30px;
                font-size: 6rem;
                font-family: 'Montserrat', Arial, sans-serif;
                font-weight: 900;
                color: rgba(198, 12, 48, 0.04);
                transform: rotate(-45deg);
                pointer-events: none;
                z-index: 0;
                letter-spacing: 0.1em;
            }
        }

        /* Screen-only: hide print-only elements */
        .print-header,
        .print-footer,
        .whatsapp-section-print,
        .print-section-title {
            display: none;
        }
    </style>
</head>

<body>

    <nav class="navbar scrolled no-print" id="mainNav">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Elexsiya 26" class="logo-img" />
                <span class="logo-text">Elexsiya</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
            </ul>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="success-card" id="successCard">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        (async function () {
            const card = document.getElementById('successCard');
            card.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">&#9203; Loading your registration...</div>';

            const regId = sessionStorage.getItem('currentRegId');

            if (!regId) {
                card.innerHTML = `
                  <div class="success-icon">&#9888;&#65039;</div>
                  <h1 style="color:var(--emirates-red);">No Payment Data</h1>
                  <p class="success-msg">Please complete registration and payment first.</p>
                  <a href="register.html" class="btn btn-red">Register Now</a>`;
                return;
            }

            const regs = await getRegistrations();
            const reg = regs.find(r => r.regId === regId);

            if (!reg) {
                card.innerHTML = `
                  <div class="success-icon">⚠️</div>
                  <h1 style="color:var(--emirates-red);">Registration Not Found</h1>
                  <p class="success-msg">Something went wrong. Please try again.</p>
                  <a href="register.html" class="btn btn-red">Register Again</a>`;
                return;
            }

            const isPaid = reg.paymentStatus === 'Paid';
            const isVerifyReq = reg.paymentStatus === 'Verification Required';
            const allowView = sessionStorage.getItem('allowSuccessView') === regId;

            // Only block if truly nothing uploaded / no allow flag
            if (!isPaid && !isVerifyReq && !allowView) {
                window.location.href = 'payment.html';
                return;
            }

            // ── Status config ──────────────────────────────────
            let statusIcon, statusTitle, statusColor, statusClass, statusMsg;
            if (isPaid) {
                statusIcon = '🎉';
                statusTitle = 'Registration Confirmed!';
                statusColor = '#16a34a';
                statusClass = 'paid';
                statusMsg = 'Your slot at Elexsiya 26 is confirmed. See you on March 27!';
            } else if (isVerifyReq) {
                statusIcon = '📋';
                statusTitle = 'Screenshot Received!';
                statusColor = '#6366f1';
                statusClass = 'verification';
                statusMsg = 'Your payment screenshot has been uploaded. Our team will verify and confirm within a few hours.';
            } else {
                statusIcon = '⏳';
                statusTitle = 'Payment Pending';
                statusColor = '#d97706';
                statusClass = 'pending';
                statusMsg = 'Your registration is saved. Complete the payment to confirm your spot.';
            }

            // ── Event + WhatsApp section ──────────────────────
            const eventsHTML = Object.entries(reg.teamMembersByEvent || {}).map(([evName, data]) => {
                const members = Array.isArray(data) ? data : (data.members || []);
                const teamName = !Array.isArray(data) && data.teamName ? data.teamName : null;
                const waLink = EVENT_WHATSAPP_LINKS[evName] || null;
                return `
                <div class="event-receipt-card">
                    <div class="event-receipt-info">
                        <div class="event-receipt-name">&#127919; ${evName}${teamName ? ` &nbsp;<span style="font-size:0.78rem;font-weight:600;color:var(--text-muted);">(${teamName})</span>` : ''}</div>
                        <div class="event-receipt-members"><strong>Members:</strong> ${[reg.name, ...members.map(m => m.name)].join(', ')}</div>
                        <span class="whatsapp-section-print">${waLink ? 'WhatsApp: ' + waLink : ''}</span>
                    </div>
                    ${waLink ? `
                    <a href="${waLink}" target="_blank" class="whatsapp-join-btn" style="flex-shrink:0;margin-left:12px;">
                        <span>&#128172;</span> Join Group
                    </a>` : ''}
                </div>`;
            }).join('') || '';

            // ── Amount display ────────────────────────────────
            const amountDisplay = reg.extraChessFee
                ? `&#8377;${reg.amount - reg.extraChessFee} + &#8377;${reg.extraChessFee} (Chess) = <strong>&#8377;${reg.amount}</strong>`
                : `&#8377;${reg.amount}`;

            // ── Full card HTML ────────────────────────────────
            card.innerHTML = `

            <!-- Print Header (only visible when printing) -->
            <div class="print-header">
                <div class="print-header-bar"></div>
                <div class="print-header-body">
                    <div>
                        <div class="print-title">Elexsiya 26</div>
                        <div class="print-sub">Dept. of ECE &nbsp;·&nbsp; Anna University Regional Campus, Madurai &nbsp;·&nbsp; March 27, 2026</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="print-receipt-label">Registration Receipt</div>
                        <div class="print-receipt-date">Generated: ${new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })}</div>
                    </div>
                </div>
            </div>

            <div class="success-icon">${statusIcon}</div>
            <h1 style="color:${statusColor}">${statusTitle}</h1>
            <p class="success-msg">${statusMsg}</p>

            <!-- Status Banner -->
            <div class="status-banner ${statusClass}">
                ${isPaid ? '✅ Payment Verified &amp; Confirmed' : isVerifyReq ? '🔍 Screenshot uploaded — Awaiting admin verification' : '⏳ Payment not yet received'}
            </div>

            <!-- Registration Details -->
            <div class="detail-box">
                <span class="print-section-title">Participant Details</span>
                <div class="detail-row">
                    <span class="detail-label">Registration ID</span>
                    <span class="detail-value reg-id">${reg.regId}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Name</span>
                    <span class="detail-value">${reg.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${reg.email}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value">${reg.phone || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">College</span>
                    <span class="detail-value">${reg.college}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount Paid</span>
                    <span class="detail-value">${amountDisplay}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color:${statusColor};">${reg.paymentStatus}</span>
                </div>
            </div>

            <!-- Event Summaries + WhatsApp Links -->
            ${eventsHTML ? `
            <div class="events-section">
                <div class="events-section-title">Your Events &amp; WhatsApp Groups</div>
                ${eventsHTML}
            </div>` : ''}

            <!-- Save ID reminder -->
            <div class="save-box">
                <div class="save-box-header">&#128190; Important — Save Your Receipt</div>
                <p>
                    Your Registration ID is <strong>${reg.regId}</strong>.<br/>
                    Please download this receipt as PDF and bring it to the venue for check-in.<br/>
                    ${isVerifyReq ? '<br/>📌 <strong>Note:</strong> Your spot will be confirmed once our team verifies your payment screenshot.' : ''}
                </p>
            </div>

            <!-- Get Directions -->
            <div style="margin-bottom:20px;">
                <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(reg.startingLocation || '')}&destination=Anna+University+Regional+Campus+Madurai"
                   target="_blank" class="btn btn-red no-print" style="width:100%;display:inline-block;padding:12px;border-radius:8px;text-decoration:none;font-weight:700;text-align:center;color:white;">
                    🚀 Get Directions to Venue
                </a>
            </div>

            <!-- Action Buttons -->
            <div class="success-actions">
                <a href="index.html" class="btn btn-outline-dark no-print">&#127968; Back to Home</a>
                <button class="btn-pdf no-print" onclick="downloadPDF()">&#128196; Download PDF Receipt</button>
                ${!isPaid && !isVerifyReq ? `<a href="payment.html" class="btn btn-red no-print">&#128179; Complete Payment</a>` : ''}
            </div>

            <!-- Print Footer -->
            <div class="print-footer">
                <span>&#9889; Elexsiya 26 &nbsp;&middot;&nbsp; Dept. of ECE &nbsp;&middot;&nbsp; Anna University Regional Campus, Madurai</span>
                <span>${new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })} &nbsp;&middot;&nbsp; March 27, 2026</span>
            </div>
            `;

            sessionStorage.removeItem('allowSuccessView');
            if (isPaid) {
                sessionStorage.removeItem('currentRegId');
            }
        })();

        function downloadPDF() {
            window.print();
        }
    </script>
</body>

</html>
