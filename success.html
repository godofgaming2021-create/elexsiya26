<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Confirmation – Elexsiya 26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            background: var(--bg-warm);
            position: relative;
        }

        .page-wrap::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .success-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .05);
            animation: fadeInUp .6s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: inline-block;
            animation: successBounce .8s ease-out;
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-card h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .success-card .success-msg {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 32px;
        }

        .detail-box {
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 28px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: .9rem;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-dark);
            font-size: .95rem;
        }

        .detail-value.reg-id {
            color: var(--emirates-red);
            font-family: var(--font-heading);
            font-size: 1.05rem;
            letter-spacing: 1px;
        }

        .save-box {
            background: rgba(200, 169, 81, .06);
            border: 1px solid rgba(200, 169, 81, .25);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 28px;
            text-align: left;
        }

        .save-box-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--gold-dark);
            font-size: .9rem;
        }

        .save-box p {
            color: var(--text-body);
            font-size: .88rem;
            line-height: 1.7;
        }

        .success-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 560px) {
            .success-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar scrolled" id="mainNav">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Elexsiya 26" class="logo-img" />
                <span class="logo-text">Elexsiya</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
            </ul>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="success-card" id="successCard">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        (async function () {
            const card = document.getElementById('successCard');

            card.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">&#9203; Loading your registration...</div>';

            const regId = sessionStorage.getItem('currentRegId');

            if (!regId) {
                card.innerHTML = `
          <div class="success-icon">&#9888;&#65039;</div>
          <h1 style="color:var(--emirates-red);">No Payment Data</h1>
          <p class="success-msg">Please complete registration and payment first.</p>
          <a href="register.html" class="btn btn-red">Register Now</a>
        `;
                return;
            }

            const regs = await getRegistrations();
            const reg = regs.find(r => r.regId === regId);

            if (!reg) {
                card.innerHTML = `
          <div class="success-icon">⚠️</div>
          <h1 style="color:var(--emirates-red);">Registration Not Found</h1>
          <p class="success-msg">Something went wrong. Please try again.</p>
          <a href="register.html" class="btn btn-red">Register Again</a>
        `;
                return;
            }

            const isPaid = reg.paymentStatus === 'Paid';
            if (!isPaid && sessionStorage.getItem('allowSuccessView') !== regId) {
                window.location.href = 'payment.html';
                return;
            }

            card.innerHTML = `
        <div class="success-icon">${isPaid ? '🎉' : '⏳'}</div>
        <h1 style="color:${isPaid ? '#16a34a' : 'var(--gold-dark)'}">
          ${isPaid ? 'Registration Confirmed!' : 'Payment Pending'}
        </h1>
        <p class="success-msg">
          ${isPaid
                    ? 'Your registration for Elexsiya 26 is confirmed!'
                    : 'Your registration is saved. Complete the payment to confirm your spot.'}
        </p>

        <div class="detail-box">
          <div class="detail-row">
            <span class="detail-label">Registration ID</span>
            <span class="detail-value reg-id">${reg.regId}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Name</span>
            <span class="detail-value">${reg.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value">${reg.email}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">College</span>
            <span class="detail-value">${reg.college}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Amount</span>
            <span class="detail-value">
              ${reg.extraChessFee
                    ? `&#8377;${reg.amount - reg.extraChessFee} + &#8377;${reg.extraChessFee} (Chess) = <strong>&#8377;${reg.amount}</strong>`
                    : `&#8377;${reg.amount}`}
            </span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status</span>
            <span class="detail-value" style="color:${isPaid ? '#16a34a' : 'var(--gold-dark)'}">
              ${reg.paymentStatus}
            </span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Starting Location</span>
            <span class="detail-value">${reg.startingLocation || 'My Location'}</span>
          </div>
          <div style="margin-top: 25px; text-align: center;">
            <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(reg.startingLocation || '')}&destination=Anna+University+Regional+Campus+Madurai" target="_blank" class="btn btn-red" style="width: 100%; display: inline-block; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 700; text-align: center; color: white;">
              🚀 GET DIRECTIONS FROM YOUR LOCATION
            </a>
          </div>
        </div>

        <!-- Event Breakdown -->
        <div style="margin-top: 20px; text-align: left;">
            <p style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 12px; padding-left: 5px;">Event Summaries</p>
            ${Object.entries(reg.teamMembersByEvent || {}).map(([evName, data], i) => `
                <div style="background: rgba(0,0,0,0.02); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border-light);">
                    <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                        <span style="font-weight: 700; color: var(--emirates-red); font-size: 0.95rem;">&#127919; ${evName}</span>
                    </div>
                    ${data.teamName ? `<div style="font-size: 0.85rem; margin-bottom: 6px; color: var(--text-dark);"><strong>Team:</strong> ${data.teamName}</div>` : ''}
                    <div style="font-size: 0.82rem; color: var(--text-muted);">
                        <strong>Members:</strong> ${data.members.map(m => m.name).join(', ')}
                    </div>
                </div>
            `).join('')}
        </div>

        ${isPaid ? `
        <div class="save-box">
          <div class="save-box-header">&#128190; Save Your Registration ID</div>
          <p>
            Please screenshot or note down your Registration ID: <strong>${reg.regId}</strong>.<br/><br/>
            Bring this ID (and payment proof) to the venue for entry verification. See you at Elexsiya 26! 🚀
          </p>
        </div>` : ''}

        <div class="success-actions">
          <a href="index.html" class="btn btn-outline-dark">&#127968; Back to Home</a>
          ${!isPaid ? `<a href="payment.html" class="btn btn-red">&#128179; Complete Payment</a>` : ''}
        </div>
      `;

            sessionStorage.removeItem('allowSuccessView');
            if (isPaid) {
                sessionStorage.removeItem('currentRegId');
            }
        })();
    </script>
</body>

</html>
