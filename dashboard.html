<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – Elexsiya 26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: var(--bg-warm);
        }

        /* Top bar */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, .97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
            padding: 14px 0;
        }

        .topbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar .logo {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--emirates-red);
            letter-spacing: 0.06em;
            text-decoration: none;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-name {
            color: var(--text-muted);
            font-size: .9rem;
            font-family: var(--font-body);
        }

        .btn-logout {
            padding: 8px 20px;
            font-size: .85rem;
            background: rgba(198, 12, 48, .08);
            border: 1px solid rgba(198, 12, 48, .25);
            color: var(--emirates-red);
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-logout:hover {
            background: rgba(198, 12, 48, .15);
        }

        /* Dashboard */
        .dashboard {
            padding: 90px 0 60px;
        }

        .dash-header {
            margin-bottom: 32px;
        }

        .dash-header h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 4px;
            color: var(--text-dark);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .dash-header p {
            color: var(--text-muted);
            font-size: .95rem;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .toolbar input {
            flex: 1;
            min-width: 220px;
            padding: 12px 18px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text-dark);
            font-family: var(--font-body);
            font-size: .95rem;
            outline: none;
            transition: var(--transition);
        }

        .toolbar input:focus {
            border-color: var(--emirates-red);
            box-shadow: 0 0 0 3px rgba(198, 12, 48, .08);
        }

        .toolbar input::placeholder {
            color: var(--text-muted);
        }

        .toolbar select {
            padding: 12px 18px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            color: var(--text-dark);
            font-family: var(--font-body);
            font-size: .95rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .toolbar select:focus {
            border-color: var(--emirates-red);
        }

        .toolbar select option {
            background: var(--white);
            color: var(--text-dark);
        }

        .btn-csv {
            padding: 12px 24px;
            background: rgba(200, 169, 81, .1);
            border: 1px solid rgba(200, 169, 81, .3);
            color: var(--gold-dark);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: .9rem;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-csv:hover {
            background: rgba(200, 169, 81, .2);
        }

        /* Table */
        .table-section {
            margin-bottom: 24px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-data h3 {
            margin-bottom: 8px;
            color: var(--text-body);
        }

        /* Team member row */
        .team-members-row td {
            padding: 0 !important;
        }

        .team-members-wrap {
            background: rgba(200, 169, 81, .03);
            border-top: 1px solid var(--border-light);
            padding: 12px 20px 14px;
        }

        .team-member-item {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 24px;
            font-size: .82rem;
            color: var(--text-body);
            padding: 6px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .team-member-item:last-child {
            border-bottom: none;
        }

        .team-member-item strong {
            color: var(--text-dark);
            min-width: 140px;
        }

        .team-members-label {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--gold-dark);
            margin-bottom: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                padding: 80px 0 40px;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .toolbar input,
            .toolbar select {
                min-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="container">
            <a href="index.html" class="logo">ELEXSIYA ADMIN</a>
            <div class="topbar-right">
                <span class="admin-name">👤 Admin</span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="container">

            <div class="dash-header">
                <h1>📊 Dashboard</h1>
                <p>Overview of all registrations and payments</p>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="statsRow">
                <div class="premium-card stat-card">
                    <div class="stat-value" id="totalRegs" style="color:var(--emirates-red);">0</div>
                    <div class="stat-label">Total Registrations</div>
                </div>
                <div class="premium-card stat-card">
                    <div class="stat-value" id="totalPaid" style="color:#16a34a;">0</div>
                    <div class="stat-label">Paid Users</div>
                </div>
                <div class="premium-card stat-card">
                    <div class="stat-value" id="totalPending" style="color:var(--gold-dark);">0</div>
                    <div class="stat-label">Pending Payments</div>
                </div>
                <div class="premium-card stat-card">
                    <div class="stat-value" id="totalRevenue" style="color:var(--emirates-red);">₹0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <input type="text" placeholder="🔍 Search by name, email, college, or reg ID..." id="searchInput" />
                <select id="filterStatus">
                    <option value="all">All Status</option>
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                </select>
                <button class="btn-csv" id="csvBtn">📥 Download CSV</button>
            </div>

            <!-- Table -->
            <div class="table-section">
                <div class="table-wrap" id="tableWrap">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="shared.js"></script>
    <script>
        // Auth guard
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin.html';
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function () {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin.html';
        });

        let allRegistrations = [];

        async function loadData() {
            const wrap = document.getElementById('tableWrap');
            wrap.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">&#9203; Loading registrations from database...</div>';
            allRegistrations = await getRegistrations();
            updateStats();
            renderTable(allRegistrations);
        }

        function updateStats() {
            const total = allRegistrations.length;
            const paid = allRegistrations.filter(r => r.paymentStatus === 'Paid').length;
            const pending = total - paid;
            const revenue = allRegistrations.filter(r => r.paymentStatus === 'Paid').reduce((sum, r) => sum + r.amount, 0);

            document.getElementById('totalRegs').textContent = total;
            document.getElementById('totalPaid').textContent = paid;
            document.getElementById('totalPending').textContent = pending;
            document.getElementById('totalRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
        }

        function renderTable(data) {
            const wrap = document.getElementById('tableWrap');
            if (data.length === 0) {
                wrap.innerHTML = `<div class="no-data"><h3>No registrations found</h3><p>Registrations will appear here once users sign up.</p></div>`;
                return;
            }
            function fmtDate(iso) { if (!iso) return '-'; const d = new Date(iso); return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); }
            function fmtTime(iso) { if (!iso) return '-'; const d = new Date(iso); return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }); }
            function hostelBadge(v) { return v === 'Yes' ? `<span style="color:#34d399;font-weight:700;">&#10004; Yes</span>` : `<span style="color:var(--text-muted);">No</span>`; }
            function foodBadge(f) {
                if (!f) return '-';
                return f === 'Veg'
                    ? `<span style="color:#86efac;font-weight:600;">&#129382; Veg</span>`
                    : `<span style="color:#fca5a5;font-weight:600;">&#127829; Non-Veg</span>`;
            }

            let html = `<table class="data-table">
          <thead><tr>
            <th>#</th><th>Reg ID</th><th>Type</th><th>Name</th><th>Email</th><th>Phone</th>
            <th>College</th><th>Event(s)</th><th>Food</th><th>Hostel</th>
            <th>Date</th><th>Time</th><th>Amount</th><th>Status</th>
          </tr></thead><tbody>`;

            data.forEach((r, i) => {
                const badgeClass = r.paymentStatus === 'Paid' ? 'badge-paid' : 'badge-pending';
                const hasTeam = r.members && r.members.length > 0;
                const totalPersons = hasTeam ? (r.teamSize || r.members.length + 1) : 1;
                const typeBadge = hasTeam
                    ? `<span style="display:inline-block;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:700;background:rgba(200,169,81,.1);color:var(--gold-dark);border:1px solid rgba(200,169,81,.3);">&#128101; Team&#183;${totalPersons}</span>`
                    : `<span style="display:inline-block;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:700;background:rgba(198,12,48,.08);color:var(--emirates-red);border:1px solid rgba(198,12,48,.2);">&#128100; Individual</span>`;
                const eventDisplay = (r.events && r.events.length > 1)
                    ? r.events.map(e => e.event || e).join(' + ')
                    : (r.event || '-');

                // 🔒 #3: Tamper detection
                const tampered = isRegistrationTampered(r);
                const tamperedBadge = tampered
                    ? `<span style="display:inline-block;margin-left:6px;padding:2px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:6px;font-size:.68rem;font-weight:700;color:#ef4444;">&#9888; TAMPERED</span>`
                    : '';

                // Main row
                html += `<tr>
              <td>${i + 1}</td>
              <td style="color:var(--emirates-red);font-weight:600;font-family:var(--font-heading);font-size:.9rem;white-space:nowrap;">${r.regId}${tamperedBadge}</td>
              <td>${typeBadge}</td>
              <td style="color:var(--text-primary);font-weight:600;">${hasTeam ? '&#127942; ' : ''}${r.name}</td>
              <td style="font-size:.88rem;">${r.email}</td>
              <td>${r.phone}</td>
              <td style="font-size:.88rem;">${r.college}</td>
              <td style="color:var(--emirates-red);font-weight:500;font-size:.85rem;">${eventDisplay}</td>
              <td>${foodBadge(r.food)}</td>
              <td>${hostelBadge(r.hostel)}</td>
              <td style="white-space:nowrap;font-size:.85rem;">${fmtDate(r.registeredAt)}</td>
              <td style="white-space:nowrap;font-size:.85rem;">${fmtTime(r.registeredAt)}</td>
              <td style="font-weight:700;color:var(--emirates-red);">&#8377;${r.amount}</td>
              <td><span class="badge ${badgeClass}">${r.paymentStatus}</span></td>
            </tr>`;

                // Team detail sub-row
                if (hasTeam) {
                    // Build member cards — grouped per event if available, else flat list
                    let memberCardsHTML = '';
                    if (r.teamMembersByEvent && Object.keys(r.teamMembersByEvent).length > 0) {
                        // New format: members stored per-event with team name
                        Object.entries(r.teamMembersByEvent).forEach(([evName, evData]) => {
                            // Support both old {members:[]} and new {teamName:'', members:[]} shapes
                            const members = Array.isArray(evData) ? evData : (evData.members || []);
                            const teamName = (!Array.isArray(evData) && evData.teamName) ? evData.teamName : null;
                            memberCardsHTML += `<div style="margin-bottom:18px;">
                                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
                                    <span style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--emirates-red);">&#127919; ${evName}</span>
                                    ${teamName ? `<span style="background:rgba(198,12,48,.08);border:1px solid rgba(198,12,48,.22);border-radius:50px;padding:3px 12px;font-size:.78rem;font-weight:700;color:var(--emirates-red);">&#128101; ${teamName}</span>` : ''}
                                </div>
                                <!-- Member 1 = registrant -->
                                <div class="team-member-item" style="background:rgba(198,12,48,.04);border:1px solid rgba(198,12,48,.18);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;margin-bottom:8px;">
                                    <div style="grid-column:1/-1;font-weight:700;color:var(--emirates-red);font-size:.9rem;margin-bottom:4px;">&#128100; Member 1: ${r.name}</div>
                                    <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${r.email}</div>
                                    <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${r.phone}</div>
                                    <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(r.food)}</div>
                                    <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(r.hostel)}</div>
                                </div>
                                ${members.map((m, mi) => `
                                <div class="team-member-item" style="background:rgba(200,169,81,.06);border:1px solid rgba(200,169,81,.2);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;margin-bottom:8px;">
                                    <div style="grid-column:1/-1;font-weight:700;color:var(--gold-dark);font-size:.9rem;margin-bottom:4px;">&#128100; Member ${mi + 2}: ${m.name || '-'}</div>
                                    <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${m.email || '-'}</div>
                                    <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${m.phone || '-'}</div>
                                    <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(m.food)}</div>
                                    <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(m.hostel)}</div>
                                </div>`).join('')}
                            </div>`;
                        });
                        // Append individual events for mixed registrations
                        if (r.events) {
                            r.events.filter(e => e.participationMode === 'Individual').forEach(ev => {
                                memberCardsHTML += `<div style="margin-bottom:18px;">
                                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
                                        <span style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#facc15;">&#128100; ${ev.event || ev}</span>
                                        <span style="background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);border-radius:50px;padding:3px 12px;font-size:.78rem;font-weight:700;color:#facc15;">Individual</span>
                                    </div>
                                    <div class="team-member-item" style="background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.2);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;margin-bottom:8px;">
                                        <div style="grid-column:1/-1;font-weight:700;color:#facc15;font-size:.9rem;margin-bottom:4px;">&#128100; ${r.name}</div>
                                        <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${r.email}</div>
                                        <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${r.phone}</div>
                                        <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(r.food)}</div>
                                        <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(r.hostel)}</div>
                                    </div>
                                </div>`;
                            });
                        }
                    } else {
                        // Legacy flat members list
                        memberCardsHTML = `<div style="margin-bottom:8px;">
                            <div class="team-member-item" style="background:rgba(198,12,48,.04);border:1px solid rgba(198,12,48,.18);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;margin-bottom:8px;">
                                <div style="grid-column:1/-1;font-weight:700;color:var(--emirates-red);font-size:.9rem;margin-bottom:4px;">&#128100; Member 1: ${r.name}</div>
                                <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${r.email}</div>
                                <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${r.phone}</div>
                                <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(r.food)}</div>
                                <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(r.hostel)}</div>
                            </div>
                            ${(r.members || []).map((m, mi) => `
                            <div class="team-member-item" style="background:rgba(200,169,81,.06);border:1px solid rgba(200,169,81,.2);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;margin-bottom:8px;">
                                <div style="grid-column:1/-1;font-weight:700;color:var(--gold-dark);font-size:.9rem;margin-bottom:4px;">&#128100; Member ${mi + 2}: ${m.name || '-'}</div>
                                <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${m.email || '-'}</div>
                                <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${m.phone || '-'}</div>
                                <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(m.food)}</div>
                                <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(m.hostel)}</div>
                            </div>`).join('')}
                        </div>`;
                    }

                    html += `<tr class="team-members-row"><td colspan="14">
                <div class="team-members-wrap" style="padding:16px 20px;">
                  <div class="team-members-label" style="margin-bottom:14px;font-size:.88rem;">
                      &#127942; <strong>Team Event:</strong> <span style="color:var(--emirates-red);">${eventDisplay}</span>
                      &nbsp;&middot;&nbsp; &#128100; <strong>Member 1:</strong> ${r.name}
                      &nbsp;&middot;&nbsp; &#128222; ${r.phone}
                      &nbsp;&middot;&nbsp; &#127860; ${foodBadge(r.food)}
                      &nbsp;&middot;&nbsp; &#127976; Hostel: ${hostelBadge(r.hostel)}
                      &nbsp;&middot;&nbsp; &#128197; ${fmtDate(r.registeredAt)} ${fmtTime(r.registeredAt)}
                  </div>
                  <div style="display:flex;flex-direction:column;gap:10px;">
                    ${memberCardsHTML}
                  </div>
                </div></td></tr>`;
                }

                // Individual detail sub-row — same card style as team events
                if (!hasTeam) {
                    html += `<tr class="team-members-row"><td colspan="14">
                <div class="team-members-wrap" style="padding:14px 20px;">
                  <div class="team-members-label" style="margin-bottom:12px;font-size:.88rem;">
                      &#127919; <strong>Event:</strong> <span style="color:var(--emirates-red);">${eventDisplay}</span>
                      &nbsp;&middot;&nbsp; &#128197; ${fmtDate(r.registeredAt)} ${fmtTime(r.registeredAt)}
                  </div>
                  <div class="team-member-item" style="background:rgba(198,12,48,.04);border:1px solid rgba(198,12,48,.18);border-radius:12px;padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px 18px;">
                      <div style="grid-column:1/-1;font-weight:700;color:var(--emirates-red);font-size:.95rem;margin-bottom:4px;">&#128100; ${r.name}</div>
                      <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#9993; Email</span><br/>${r.email}</div>
                      <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#128222; Phone</span><br/>${r.phone}</div>
                      <div style="font-size:.83rem;color:var(--text-secondary);"><span style="color:var(--text-muted);">&#127979; College</span><br/>${r.college}</div>
                      <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127860; Food</span><br/>${foodBadge(r.food)}</div>
                      <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#127976; Hostel</span><br/>${hostelBadge(r.hostel)}</div>
                      <div style="font-size:.83rem;"><span style="color:var(--text-muted);">&#8377; Amount</span><br/><strong style="color:var(--emirates-red);">&#8377;${r.amount}</strong>${r.extraChessFee ? `<br/><span style="font-size:0.8em;color:var(--gold-dark);">(includes &#8377;${r.extraChessFee} Chess)</span>` : ''}</div>
                      <div style="font-size:.83rem;"><span class="badge ${r.paymentStatus === 'Paid' ? 'badge-paid' : 'badge-pending'}">${r.paymentStatus}</span></div>
                  </div>
                </div></td></tr>`;
                }
            });
            html += `</tbody></table>`;
            wrap.innerHTML = html;
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const status = document.getElementById('filterStatus').value;

            let filtered = allRegistrations;

            if (status !== 'all') {
                filtered = filtered.filter(r => r.paymentStatus === status);
            }

            if (query) {
                filtered = filtered.filter(r =>
                    r.name.toLowerCase().includes(query) ||
                    r.email.toLowerCase().includes(query) ||
                    r.college.toLowerCase().includes(query) ||
                    r.regId.toLowerCase().includes(query) ||
                    r.phone.includes(query)
                );
            }

            renderTable(filtered);
        }

        // Search & filter
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('filterStatus').addEventListener('change', filterData);

        document.getElementById('csvBtn').addEventListener('click', function () {
            if (allRegistrations.length === 0) { alert('No data to export'); return; }

            const headers = [
                'Reg ID', 'Type', 'Name', 'Email', 'Phone', 'College', 'Event(s)', 'Participation Mode',
                'Leader Food', 'Hostel', 'Date', 'Time', 'Amount', 'Chess Fee', 'Payment Status',
                'Member 1 Name', 'Member 1 Email', 'Member 1 Phone', 'Member 1 Food',
                'Member 2 Name', 'Member 2 Email', 'Member 2 Phone', 'Member 2 Food',
                'Member 3 Name', 'Member 3 Email', 'Member 3 Phone', 'Member 3 Food'
            ];

            const rows = allRegistrations.map(r => {
                const m1 = (r.members && r.members[0]) || {};
                const m2 = (r.members && r.members[1]) || {};
                const m3 = (r.members && r.members[2]) || {};
                const dt = r.registeredAt ? new Date(r.registeredAt) : null;
                const hasTeam = r.members && r.members.length > 0;
                const eventStr = (r.events && r.events.length > 1)
                    ? r.events.map(e => e.event || e).join(' + ')
                    : (r.event || '');
                return [
                    r.regId,
                    hasTeam ? `Team of ${r.teamSize || r.members.length + 1}` : 'Individual',
                    r.name, r.email, r.phone, r.college,
                    eventStr, r.participationMode || 'Individual',
                    r.food || '', r.hostel || '',
                    dt ? dt.toLocaleDateString('en-IN') : '',
                    dt ? dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }) : '',
                    r.amount, r.extraChessFee || 0, r.paymentStatus,
                    m1.name || '', m1.email || '', m1.phone || '', m1.food || '',
                    m2.name || '', m2.email || '', m2.phone || '', m2.food || '',
                    m3.name || '', m3.email || '', m3.phone || '', m3.food || ''
                ];
            });

            let csv = headers.join(',') + '\n';
            rows.forEach(row => { csv += row.map(val => `"${String(val).replace(/"/g, '""')}"`).join(',') + '\n'; });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Elexsiya_Registrations_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Initial load
        loadData();
    </script>
</body>

</html>
