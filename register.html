<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com https://api.emailjs.com;">

    <meta name="description" content="Register for Elexsiya 26 – National Level Technical Symposium." />

    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" /></noscript>
    <link rel="stylesheet" href="styles.css?v=4" />
    <style>
        /* ── Page layout ── */
        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 100px 20px 80px;
            background: var(--bg-warm);
            position: relative;
        }

        .page-wrap::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            animation: fadeInUp .6s ease-out;
            overflow-x: hidden;
            overflow-wrap: break-word;
        }

        .form-container.team-mode {
            max-width: 740px;
        }

        /* ── Header ── */
        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: .95rem;
        }

        /* ── Form card ── */
        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 24px rgba(0, 0, 0, .04);
        }

        /* Used when formContainer is the card itself */
        #formContainer {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 24px rgba(0, 0, 0, .04);
        }

        /* ── Event badge ── */
        .event-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .event-badge-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 18px;
            border-radius: 50px;
            font-size: .82rem;
            font-weight: 600;
            font-family: var(--font-body);
        }

        .event-badge-item.ev {
            background: rgba(198, 12, 48, .08);
            border: 1px solid rgba(198, 12, 48, .22);
            color: var(--emirates-red);
        }

        .event-badge-item.mode {
            background: rgba(200, 169, 81, .08);
            border: 1px solid rgba(200, 169, 81, .3);
            color: var(--gold-dark);
        }

        /* ── Member section titles ── */
        .member-section {
            margin-bottom: 4px;
        }

        .member-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--emirates-red);
            margin: 28px 0 18px;
            letter-spacing: .03em;
            font-family: var(--font-body);
            text-transform: uppercase;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .member-title.nt {
            color: var(--gold-dark);
        }

        .member-title.sp {
            color: var(--gold);
        }

        .member-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        /* Leader event label pill */
        .leader-ev-label {
            background: rgba(198, 12, 48, .06);
            border: 1px solid rgba(198, 12, 48, .18);
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 14px;
            font-size: .82rem;
            color: var(--emirates-red);
            font-family: var(--font-body);
        }

        /* ── Member data grid ── */
        .member-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }

        .member-grid .form-group {
            grid-column: span 1;
        }

        /* ── Food options ── */
        .food-options {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .food-option {
            flex: 1;
            position: relative;
        }

        .food-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .food-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 14px;
            background: var(--white);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: .9rem;
            font-weight: 500;
            font-family: var(--font-body);
            color: var(--text-body);
        }

        .food-option input[type="radio"]:checked+label {
            border-color: var(--emirates-red);
            background: rgba(198, 12, 48, .04);
            color: var(--emirates-red);
            font-weight: 600;
        }

        .food-option label:hover {
            border-color: var(--gray-light);
        }

        /* ── Hostel toggle ── */
        .hostel-toggle {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            padding: 14px 18px;
            background: var(--white);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .hostel-toggle:hover {
            border-color: var(--gray-light);
        }

        .hostel-toggle.active {
            border-color: var(--emirates-red);
            background: rgba(198, 12, 48, .04);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border-light);
            border-radius: 50px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: var(--white);
            border-radius: 50%;
            transition: var(--transition);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
        }

        .hostel-toggle.active .toggle-switch {
            background: var(--emirates-red);
        }

        .hostel-toggle.active .toggle-switch::after {
            transform: translateX(20px);
        }

        .toggle-text {
            font-size: .9rem;
            font-weight: 500;
            color: var(--text-body);
            font-family: var(--font-body);
        }

        .hostel-toggle.active .toggle-text {
            color: var(--emirates-red);
        }

        /* ── Paste button ── */
        .input-paste-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-paste-wrap input {
            flex: 1;
            padding-right: 72px !important;
        }

        .btn-paste {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 5px 10px;
            font-size: .72rem;
            font-weight: 700;
            font-family: var(--font-body);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            background: rgba(198, 12, 48, .06);
            color: var(--emirates-red);
            cursor: pointer;
            transition: all .18s;
            letter-spacing: .02em;
            white-space: nowrap;
        }

        .btn-paste:hover {
            background: rgba(198, 12, 48, .14);
            border-color: rgba(198, 12, 48, .4);
        }

        .btn-paste.pasted {
            background: rgba(22, 163, 74, .12);
            border-color: rgba(22, 163, 74, .4);
            color: #16a34a;
        }

        .btn-paste.denied {
            background: rgba(198, 12, 48, .12);
            border-color: rgba(198, 12, 48, .4);
            color: var(--emirates-red);
        }

        /* ── Submit & fee ── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            margin-top: 28px;
            letter-spacing: .1em;
        }

        .fee-note {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: .85rem;
        }

        .fee-note strong {
            color: var(--emirates-red);
        }

        /* ── Form footer ── */
        .form-footer {
            text-align: center;
            margin-top: 16px;
        }

        .form-footer a {
            font-size: .88rem;
            color: var(--text-muted);
        }

        .form-footer a:hover {
            color: var(--emirates-red);
        }

        /* Team name label override in JS-built HTML */
        label[style*="color:var(--neon-cyan)"] {
            color: var(--emirates-red) !important;
        }

        /* Inline event label pills in JS HTML */
        div[style*="rgba(0,240,255"] {
            background: rgba(198, 12, 48, .06) !important;
            border-color: rgba(198, 12, 48, .2) !important;
            color: var(--emirates-red) !important;
        }

        /* Member-title overrides inside JS HTML */
        .member-title[style*="color:var(--neon-cyan)"] {
            color: var(--emirates-red) !important;
        }

        .member-title[style*="color:var(--neon-purple)"] {
            color: var(--gold-dark) !important;
        }

        @media (max-width: 580px) {
            .member-grid {
                grid-template-columns: 1fr;
            }

            #formContainer {
                padding: 28px 18px;
            }
        }

        /* ── Event Section Styling ── */
        .event-registration-section {
            background: #fff;
            border: 1.5px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 40px;
            position: relative;
            transition: var(--transition);
        }

        .event-registration-section:hover {
            border-color: rgba(198, 12, 48, .2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .03);
        }

        .section-number {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--emirates-red);
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* ── Verify with Google ── */
        .btn-verify {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text-dark);
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .btn-verify:hover {
            background: #f8f8f8;
            border-color: #4285F4;
        }

        .btn-verify img {
            width: 20px;
            height: 20px;
        }

        .verified-badge {
            display: none;
            align-items: center;
            gap: 6px;
            color: #16a34a;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 8px;
        }

        .has-error .verified-badge {
            display: none !important;
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"
        onerror="alert('Failed to load Firebase App SDK. Check your internet or if gstatic.com is blocked.')"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check-compat.js"></script>

    <script src="firebase-config.js?v=1.1"
        onerror="alert('Failed to load firebase-config.js. Ensure the file exists in the same folder.')"></script>
    <script src="shared.js?v=1.1" onerror="alert('Failed to load shared.js.')"></script>
    <script>

        /* ---------- Debounce Helper ---------- */
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function pasteToField(inputId, btnEl) {
            if (!navigator.clipboard || !navigator.clipboard.readText) { alert('Please paste manually (Ctrl+V).'); return; }
            try {
                const text = await navigator.clipboard.readText();
                const el = document.getElementById(inputId);
                if (el) { el.value = text.trim(); el.dispatchEvent(new Event('input')); el.focus(); }
                if (btnEl) { btnEl.textContent = '&#10003; Pasted'; btnEl.classList.add('pasted'); setTimeout(() => { btnEl.textContent = '&#128203; Paste'; btnEl.classList.remove('pasted'); }, 2000); }
            } catch (err) {
                if (btnEl) { btnEl.textContent = '&#128683; Denied'; btnEl.classList.add('denied'); setTimeout(() => { btnEl.textContent = '&#128203; Paste'; btnEl.classList.remove('denied'); }, 2200); }
            }
        }

        // Helper to resume an existing unpaid payment
        function resumeUnpaidPayment(regId) {
            if (!regId) return;
            sessionStorage.setItem('currentRegId', regId);
            window.location.href = 'payment.html';
        }

        /* ---------- Clone Member Helper ---------- */
        function cloneMemberData(sourcePrefix, targetPrefix) {
            const fields = ['name', 'email', 'phone'];
            fields.forEach(f => {
                const src = document.getElementById(`${sourcePrefix}_${f}`);
                const tgt = document.getElementById(`${targetPrefix}_${f}`);
                if (src && tgt) {
                    tgt.value = src.value;
                    tgt.dispatchEvent(new Event('input')); // trigger validation/fee update
                }
            });

            // Food
            const srcFood = document.querySelector(`input[name="food_${sourcePrefix}"]:checked`);
            if (srcFood) {
                const tgtFood = document.getElementById(`food${srcFood.value === 'Veg' ? 'Veg' : 'NonVeg'}_${targetPrefix}`);
                if (tgtFood) {
                    tgtFood.checked = true;
                    tgtFood.dispatchEvent(new Event('change'));
                }
            }

            // Hostel
            const srcHostel = document.getElementById(`hostelInput_${sourcePrefix}`);
            const tgtHostel = document.getElementById(`hostelInput_${targetPrefix}`);
            const tgtToggle = document.getElementById(`hostelToggle_${targetPrefix}`);
            if (srcHostel && tgtHostel && tgtToggle) {
                if (srcHostel.value === 'Yes' && tgtHostel.value !== 'Yes') {
                    tgtToggle.click();
                } else if (srcHostel.value === 'No' && tgtHostel.value !== 'No') {
                    tgtToggle.click();
                }
            }
        }


        async function handleGoogleVerify(mPrefix) {
            try {
                if (window.location.protocol === 'file:') {
                    alert("⚠️ FIREBASE AUTH ALERT: You are opening this file directly from your folder (file:// protocol). Google Authentication only works if you run the site on a local server (like Live Server in VS Code) or host it online. Please run it via http://localhost or similar.");
                    return;
                }

                if (!window.firebaseReady || !window.auth) {
                    console.error("Firebase Status: Ready?", window.firebaseReady, "Auth?", !!window.auth);
                    let info = "Firebase Authentication is not fully loaded yet.\n\n";
                    info += "Please try the following:\n";
                    info += "1. Wait 5 seconds and try again.\n";
                    info += "2. Disable any Ad-Blockers (Brave Shields, uBlock, etc.).\n";
                    info += "3. Try an Incognito window or a different browser.\n\n";
                    info += "If you see this repeated, your network may be blocking Google services.";

                    const diagBtnId = "diag_btn_" + Date.now();
                    setTimeout(() => {
                        const existing = document.getElementById('diag-area');
                        if (existing) existing.remove();
                        const div = document.createElement('div');
                        div.id = 'diag-area';
                        div.style = "text-align:center;margin-top:20px;";
                        div.innerHTML = `<button id="${diagBtnId}" style="padding:10px 20px;background:#f0f0f0;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-weight:bold;color:#555;">🔍 Check System Status</button>`;
                        const vBtn = document.querySelector('.btn-verify');
                        if (vBtn) vBtn.parentElement.appendChild(div);

                        document.getElementById(diagBtnId).onclick = () => {
                            let report = "--- SYSTEM DIAGNOSTICS ---\n";
                            report += "App Instance: " + (firebase.apps.length ? "Initialized ✅" : "NOT READY ❌") + "\n";
                            report += "Firebase Auth: " + (typeof firebase.auth === 'function' ? "Available ✅" : "MISSING (Check Internet) ❌") + "\n";
                            report += "Auth Object: " + (window.auth ? "Created ✅" : "NOT INITIALIZED ❌") + "\n";
                            if (window.authInitError) report += "Init Error: " + window.authInitError + "\n";
                            report += "Ready Flag: " + (window.firebaseReady ? "True ✅" : "False ❌") + "\n";
                            report += "Domain: " + window.location.hostname + "\n";
                            alert(report);
                        };
                    }, 500);

                    throw new Error(info);
                }

                const result = await window.auth.signInWithPopup(window.googleProvider);
                const user = result.user;

                if (user && user.email) {
                    const nameInput = document.getElementById(`${mPrefix}_name`);
                    const emailInput = document.getElementById(`${mPrefix}_email`);
                    const badge = document.getElementById(`${mPrefix}_verifiedBadge`);
                    const verifyBtn = document.getElementById(`${mPrefix}_verifyBtn`);

                    if (nameInput) nameInput.value = user.displayName || "";
                    if (emailInput) {
                        emailInput.value = user.email;
                        emailInput.readOnly = true;
                        emailInput.style.backgroundColor = "#f0f0f0";
                        emailInput.style.cursor = "not-allowed";
                    }

                    if (badge) badge.style.display = "flex";
                    if (verifyBtn) verifyBtn.style.display = "none";

                    window.isVerified = true;
                    updateFeeDisplay();
                }
            } catch (error) {
                console.error("Google Auth failed:", error);
                let msg = "Verification failed. ";
                if (error.code === 'auth/popup-closed-by-user') {
                    msg += "The sign-in popup was closed before completion.";
                } else if (error.code === 'auth/operation-not-allowed' || error.code === 'auth/configuration-not-found') {
                    msg += "Google Sign-In is not enabled in your Firebase Console.\n\nPlease:\n1. Go to Firebase Console > Authentication > Sign-in method.\n2. Click 'Add new provider' and choose 'Google'.\n3. Click 'Enable' and 'Save'.";
                } else if (error.code === 'auth/unauthorized-domain') {
                    msg += "This domain (" + window.location.hostname + ") is not authorized in Firebase Console.\n\nPlease add it under Authentication > Settings > Authorized domains.";
                } else {
                    msg += error.message;
                }

                alert(msg + "\n\nError Code: " + error.code);
            }
        }

        (async function () {
            const PRICE_PER_PERSON = 250;

            let eventsArr = [];
            const raw = sessionStorage.getItem('selectedEvents');
            if (raw) { try { eventsArr = JSON.parse(raw); } catch (e) { } }
            if (!eventsArr.length) {
                const ev = sessionStorage.getItem('selectedEvent');
                if (ev) eventsArr = [{ event: ev, participationMode: sessionStorage.getItem('participationMode') || 'Individual', teamSize: parseInt(sessionStorage.getItem('teamSize') || '1') }];
            }
            if (!eventsArr.length) { window.location.href = 'events.html'; return; }

            try {
                const closedEvents = await getClosedEvents();
                const blockedEvents = eventsArr.filter(e => closedEvents.includes(e.event));
                if (blockedEvents.length > 0) {
                    const blockedNames = blockedEvents.map(e => e.event).join(', ');
                    alert(`Registration for "${blockedNames}" has been closed. Please select other events.`);
                    sessionStorage.removeItem('selectedEvents');
                    sessionStorage.removeItem('selectedEvent');
                    window.location.href = 'events.html';
                    return;
                }
            } catch(e) {
                console.warn('[DB] Could not check closed events:', e);
            }

            // Priority Sort: Individual (1), then Team of 2, then Team of 3
            eventsArr.sort((a, b) => (a.teamSize || 1) - (b.teamSize || 1));

            const indEvents = eventsArr.filter(e => e.teamSize === 1);
            const teamEvents = eventsArr.filter(e => e.teamSize > 1);

            const firstTeam = teamEvents[0] || null;
            const participationMode = firstTeam ? (eventsArr.length === 1 ? firstTeam.participationMode : 'Multiple Events') : 'Individual';
            const selectedEvent = eventsArr.map(e => e.event).join(', ');

            const maxPossiblePersons = teamEvents.length
                ? teamEvents.reduce((sum, e) => sum + (e.teamSize || 1), 0)
                : 1;

            function getFeeInfo() {
                const emails = new Set();

                eventsArr.forEach((ev, evIdx) => {
                    const sectionPrefix = `evSection_${evIdx}`;
                    for (let i = 1; i <= ev.teamSize; i++) {
                        const el = document.getElementById(`${sectionPrefix}_m${i}_email`);
                        if (el && el.value.trim()) emails.add(el.value.trim().toLowerCase());
                    }
                });

                const filledCount = emails.size;
                const totalSlots = eventsArr.reduce((sum, e) => sum + e.teamSize, 0);
                const uniquePersons = filledCount > 0 ? filledCount : totalSlots;

                const chessEvent = eventsArr.find(e => e.event.toLowerCase() === 'chess');
                const isChessSelected = !!chessEvent;
                const chessParticipantsCount = chessEvent ? (chessEvent.teamSize || 1) : 0;

                const baseFee = PRICE_PER_PERSON * uniquePersons;
                const extraChessFee = isChessSelected ? (30 * chessParticipantsCount) : 0;

                return {
                    unique: uniquePersons,
                    baseFee,
                    extraChessFee,
                    totalFee: baseFee + extraChessFee,
                    isChessSelected,
                    chessParticipantsCount
                };
            }

            const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRx = /^\d{10}$/;

            function checkFormFilled() {
                let filled = true;
                const collegeEl = document.getElementById('college');
                const locEl = document.getElementById('startingLocation');
                if (collegeEl && !collegeEl.value.trim()) filled = false;
                if (locEl && !locEl.value.trim()) filled = false;
                
                eventsArr.forEach((ev, idx) => {
                    const sectionPrefix = `evSection_${idx}`;
                    const isTeamEventNotChess = ev.teamSize > 1 && ev.event.toLowerCase() !== 'chess';
                    if (isTeamEventNotChess) {
                        const tn = document.getElementById(`teamName_${sectionPrefix}`);
                        if (tn && !tn.value.trim()) filled = false;
                    }
                    for (let i = 1; i <= ev.teamSize; i++) {
                        const mPrefix = `${sectionPrefix}_m${i}`;
                        const nEl = document.getElementById(`${mPrefix}_name`);
                        if (nEl && !nEl.value.trim()) filled = false;
                        
                        const eEl = document.getElementById(`${mPrefix}_email`);
                        if (eEl) {
                            const evVal = eEl.value.trim();
                            if (!evVal || !emailRx.test(evVal)) filled = false;
                        }
                        
                        const pEl = document.getElementById(`${mPrefix}_phone`);
                        if (pEl) {
                            const pvVal = pEl.value.trim();
                            if (!pvVal || !phoneRx.test(pvVal)) filled = false;
                        }
                        
                        if (!document.querySelector(`input[name="food_${mPrefix}"]:checked`)) filled = false;
                    }
                });
                
                const feeWrap = document.getElementById('feeWrap');
                const msgBlock = document.getElementById('fillFormMsg');
                const btn = document.getElementById('submitBtn');
                
                if (feeWrap && msgBlock && btn) {
                    if (filled) {
                        feeWrap.style.display = 'block';
                        msgBlock.style.display = 'none';
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    } else {
                        feeWrap.style.display = 'none';
                        msgBlock.style.display = 'block';
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                        btn.style.cursor = 'not-allowed';
                    }
                }
            }

            function updateFeeDisplay() {
                const info = getFeeInfo();
                const noteEl = document.getElementById('liveFeeNote');
                if (noteEl) {
                    let html = `&#8377;${PRICE_PER_PERSON} &times; <strong>${info.unique} unique person${info.unique !== 1 ? 's' : ''}</strong> = <strong>&#8377;${info.baseFee.toLocaleString('en-IN')}</strong>`;
                    if (info.isChessSelected) {
                        html += ` <br><span style="color:var(--gold-dark);">+ &#8377;30 &times; ${info.chessParticipantsCount} Chess Entry Fee</span>`;
                        html += ` <br><strong style="font-size:1.1em;color:var(--emirates-red);">Total: &#8377;${info.totalFee.toLocaleString('en-IN')}</strong>`;
                    }
                    html += `<span style="font-size:.78rem;color:var(--text-muted);display:block;margin-top:4px;">Emails across events are counted as one person</span>`;
                    noteEl.innerHTML = html;
                }
                checkFormFilled();
            }

            const container = document.getElementById('formContainer');
            if (teamEvents.length) container.classList.add('team-mode');

            const badgesHTML = eventsArr.map(e =>
                `<span class="event-badge-item ev" title="${e.participationMode}">&#127919; ${e.event}</span>`
            ).join('');

            /* ── Food HTML helper ── */
            function foodHTML(prefix) {
                return `<div class="food-options">
                    <div class="food-option"><input type="radio" name="food_${prefix}" id="foodVeg_${prefix}" value="Veg"/><label for="foodVeg_${prefix}">&#129382; Veg</label></div>
                    <div class="food-option"><input type="radio" name="food_${prefix}" id="foodNonVeg_${prefix}" value="Non-Veg"/><label for="foodNonVeg_${prefix}">&#127829; Non-Veg</label></div>
                </div><div class="error-msg" id="foodError_${prefix}">Please select food preference</div>`;
            }

            /* ── Hostel toggle HTML helper ── */
            function hostelHTML(id) {
                return `<div class="form-group">
                    <label>Need Hostel Accommodation?</label>
                    <div class="hostel-toggle" id="hostelToggle_${id}">
                        <div class="toggle-switch"></div>
                        <span class="toggle-text">&#127976; Yes, I need accommodation</span>
                    </div>
                    <input type="hidden" id="hostelInput_${id}" value="No"/>
                </div>`;
            }

            /* ── Member fields HTML ── */
            function eventMemberFormHTML(sectionPrefix, memberIdx, isFirstMember = false, isChess = false) {
                const prefix = `${sectionPrefix}_m${memberIdx}`;

                let titleText;
                if (isChess) {
                    titleText = `Participant ${memberIdx}`;
                } else {
                    titleText = isFirstMember ? (memberIdx === 1 ? 'Participant / Leader Details' : `Member ${memberIdx}`) : `Member ${memberIdx}`;
                }

                // Auto-fill button for subsequent events
                let autofillBtn = '';
                if (sectionPrefix !== 'evSection_0') {
                    // Only show if Event 1 has this member index
                    const firstEv = eventsArr[0];
                    if (firstEv && memberIdx <= firstEv.teamSize) {
                        autofillBtn = `<button type="button" onclick="cloneMemberData('evSection_0_m${memberIdx}', '${prefix}')" style="margin-left:auto; font-size:0.75rem; padding:4px 10px; background:rgba(22,163,74,0.1); color:#16a34a; border:1px solid rgba(22,163,74,0.3); border-radius:50px; cursor:pointer; font-weight:700; white-space:nowrap; transition:0.2s;">&#11118; Auto-fill from Event 1</button>`;
                    }
                }

                return `<div class="member-section">
                    <div class="member-title">${titleText} ${autofillBtn}</div>
                    <div class="member-grid">
                        <div class="form-group" id="${prefix}_nameGroup"><label for="${prefix}_name">Full Name *</label><input type="text" id="${prefix}_name" placeholder="Full name" maxlength="100"/><div class="error-msg" id="${prefix}_nameError">Please enter name</div></div>
                        <div class="form-group" id="${prefix}_emailGroup"><label for="${prefix}_email">Email *</label><div class="input-paste-wrap"><input type="email" id="${prefix}_email" class="email-input" placeholder="email@example.com" maxlength="150"/><button type="button" class="btn-paste" onclick="pasteToField('${prefix}_email',this)">&#128203; Paste</button></div><div class="error-msg" id="${prefix}_emailError">Please enter valid email</div></div>
                        <div class="form-group" id="${prefix}_phoneGroup"><label for="${prefix}_phone">Phone *</label><div class="input-paste-wrap"><input type="tel" id="${prefix}_phone" class="phone-input" placeholder="10-digit mobile" maxlength="15"/><button type="button" class="btn-paste" onclick="pasteToField('${prefix}_phone',this)">&#128203; Paste</button></div><div class="error-msg" id="${prefix}_phoneError">Please enter valid phone</div></div>
                        <div class="form-group" id="foodGroup_${prefix}"><label>Food Preference *</label>${foodHTML(prefix)}</div>
                    </div>
                    ${hostelHTML(prefix)}
                </div>`;
            }

            /* ── Build form ── */
            function buildForm() {
                let sectionsHTML = '';

                // Shared College Name & Location Group
                const sharedGroupHTML = `
                <div class="shared-shared-fields" style="margin-bottom: 30px; border-bottom: 2px solid var(--border-light); padding-bottom: 20px;">
                    <div class="form-group" id="collegeGroup" style="margin-bottom: 15px;">
                        <label for="college">College Name * <span style="font-size:0.8rem; font-weight:400; color:var(--text-muted);">(Shared for all)</span></label>
                        <input type="text" id="college" placeholder="Enter your college name" maxlength="150"/>
                        <div class="error-msg" id="collegeError">Please enter your college name</div>
                    </div>
                    <div class="form-group" id="locationGroup">
                        <label for="startingLocation">Starting Location (City/Area) * <span style="font-size:0.8rem; font-weight:400; color:var(--text-muted);">(Used for directions)</span></label>
                        <input type="text" id="startingLocation" placeholder="e.g. Arapalayam, Madurai" maxlength="100"/>
                        <div class="error-msg" id="locationError">Please enter your starting location</div>
                    </div>
                </div>`;

                eventsArr.forEach((ev, idx) => {
                    const sectionPrefix = `evSection_${idx}`;
                    const isChess = ev.event.toLowerCase() === 'chess' || ev.isChess;
                    const isTeam = ev.teamSize > 1;
                    const typeLabel = isChess ? '' : (isTeam ? `Team of ${ev.teamSize}` : 'Individual');
                    const titleColor = isTeam ? 'var(--emirates-red)' : 'var(--gold-dark)';

                    let memberForms = '';
                    for (let i = 1; i <= ev.teamSize; i++) {
                        memberForms += eventMemberFormHTML(sectionPrefix, i, i === 1, isChess);
                    }
                    const isIdeaForge = ev.event.toLowerCase() === 'idea forge' || ev.event.toLowerCase() === 'ideaforge';
                    
                    const domainField = isIdeaForge ? `
                        <div class="form-group" id="domainGroup_${sectionPrefix}" style="margin-bottom:20px;">
                            <label for="domain_${sectionPrefix}" style="color:var(--emirates-red); font-weight:700;">&#127760; Project Domain for ${ev.event} *</label>
                            <select id="domain_${sectionPrefix}" style="width:100%; padding:12px; border:1.5px solid var(--border-light); border-radius:var(--radius); font-family:var(--font-body); font-weight:600; color:var(--text-dark); background:white;">
                                <option value="Emerging technology" selected>Emerging technology</option>
                                <option value="Embedded and iot">Embedded and iot</option>
                                <option value="AI and ML">AI and ML</option>
                                <option value="EV technology">EV technology</option>
                            </select>
                        </div>` : '';

                    const isTeamEventNotChess = isTeam && ev.event.toLowerCase() !== 'chess';
                    const teamNameField = isTeamEventNotChess ? `
                        <div class="form-group" id="teamNameGroup_${sectionPrefix}" style="margin-bottom:20px;">
                            <label for="teamName_${sectionPrefix}" style="color:var(--emirates-red); font-weight:700;">&#128101; Team Name for ${ev.event} *</label>
                            <input type="text" id="teamName_${sectionPrefix}" placeholder="e.g. Dream Team" style="font-weight:600;" maxlength="100"/>
                            <div class="error-msg" id="teamNameError_${sectionPrefix}">Please enter a team name</div>
                        </div>` : '';

                    sectionsHTML += `
                        <div class="event-registration-section">
                            <div class="section-number">SECTION ${idx + 1}</div>
                            <div class="member-title" style="color:${titleColor}; font-size: 1.1rem; margin-top:5px; margin-bottom: 25px;">
                                &#127919; ${ev.event.toUpperCase()}
                                <span style="font-size:.78rem; font-weight:400; color:var(--text-muted); margin-left:10px;">(${typeLabel})</span>
                            </div>
                            ${domainField}
                            ${teamNameField}
                            ${memberForms}
                        </div>
                    `;
                });

                container.classList.add('team-mode');
                container.innerHTML = `<div class="form-header"><h1>&#128221; Registration</h1><p>Separate forms for each selected event in priority order</p></div>
                    <div class="event-badge" style="flex-wrap:wrap;">${badgesHTML}</div>
                    <form id="registerForm" novalidate>
                        ${sharedGroupHTML}
                        ${sectionsHTML}
                        
                        <div id="fillFormMsg" style="text-align:center; margin-top:20px; margin-bottom:20px; padding:15px; border-radius:8px; background:rgba(198,12,48,0.05); color:var(--emirates-red); font-weight:600; font-size:0.95rem; border:1px dashed rgba(198,12,48,0.2);">
                            ⚠️ Please fill all required fields to see the final amount and proceed.
                        </div>
                        <div id="feeWrap" style="display:none; text-align:center; margin-top:20px; margin-bottom:15px;">
                            <p class="fee-note" style="margin-top:0; font-size:1.1rem !important;">Registration Fee: <span id="liveFeeNote">calculating...</span></p>
                        </div>
                        
                        <button type="submit" class="btn btn-red btn-submit" id="submitBtn" disabled style="opacity:0.5; cursor:not-allowed;">&#128640; Proceed to Payment</button>
                    </form>
                    <div class="form-footer"><a href="events.html">&#8592; Change Event</a></div>`;

                // Setup listeners
                eventsArr.forEach((ev, idx) => {
                    const sectionPrefix = `evSection_${idx}`;
                    for (let i = 1; i <= ev.teamSize; i++) {
                        const mPrefix = `${sectionPrefix}_m${i}`;
                        const t = document.getElementById('hostelToggle_' + mPrefix);
                        if (t) t.addEventListener('click', function () {
                            this.classList.toggle('active');
                            document.getElementById('hostelInput_' + mPrefix).value = this.classList.contains('active') ? 'Yes' : 'No';
                        });
                        const em = document.getElementById(mPrefix + '_email');
                        if (em) {
                            const debouncedEmailValidate = debounce(() => {
                                updateFeeDisplay();
                                validateMemberContact(mPrefix, sectionPrefix, ev.event, 'email');
                            }, 500);
                            em.addEventListener('input', debouncedEmailValidate);
                        }

                        const ph = document.getElementById(mPrefix + '_phone');
                        if (ph) {
                            const debouncedPhoneValidate = debounce(function () {
                                this.value = this.value.replace(/\D/g, '');
                                validateMemberContact(mPrefix, sectionPrefix, ev.event, 'phone');
                            }.bind(ph), 500);
                            ph.addEventListener('input', debouncedPhoneValidate);
                        }
                    }
                    if (ev.teamSize > 1) {
                        const tnEl = document.getElementById(`teamName_${sectionPrefix}`);
                        // NOTE: No live Firestore read here — background reads on every keystroke
                        // were clogging Firebase's connection queue and causing the second
                        // registration's write to hang. Team name validation happens on submit only.
                        if (tnEl) {
                            tnEl.addEventListener('input', function () {
                                const group = document.getElementById(`teamNameGroup_${sectionPrefix}`);
                                if (group && this.value.trim()) group.classList.remove('has-error');
                            });
                        }
                    }
                });

                updateFeeDisplay();
                const formEl = document.getElementById('registerForm');
                formEl.addEventListener('submit', submitForm);
                formEl.addEventListener('input', checkFormFilled);
                formEl.addEventListener('change', checkFormFilled);
            }

            // Real-time intra-form and DB duplicate check
            async function validateMemberContact(mPrefix, sectionPrefix, eventName, type, cachedRegs = null) {
                const input = document.getElementById(`${mPrefix}_${type}`);
                const group = document.getElementById(`${mPrefix}_${type}Group`);
                const errEl = document.getElementById(`${mPrefix}_${type}Error`);
                if (!input || !group) return true;

                const val = input.value.trim().toLowerCase();
                if (!val) { group.classList.remove('has-error'); return true; }

                // 1. Intra-form check (within the same section/event)
                const currentEv = eventsArr.find((_, i) => `evSection_${i}` === sectionPrefix);
                if (currentEv) {
                    for (let i = 1; i <= currentEv.teamSize; i++) {
                        const otherMPrefix = `${sectionPrefix}_m${i}`;
                        if (otherMPrefix === mPrefix) continue;
                        const otherInput = document.getElementById(`${otherMPrefix}_${type}`);
                        if (otherInput && otherInput.value.trim().toLowerCase() === val) {
                            group.classList.add('has-error');
                            if (errEl) errEl.textContent = `⚠️ This ${type === 'email' ? 'email' : 'phone'} is already used by another member in this team`;
                            return false;
                        }
                    }
                }

                /* 
                // 2. Database check (across all registrations for THIS event)
                // REMOVED as per user request to allow multiple registrations with same email/phone
                const existing = cachedRegs || await getRegistrations();
                const conflictReg = existing.find(r => {
                    // Check main registration contact
                    if (r.event.toLowerCase().includes(eventName.toLowerCase())) {
                        if (type === 'email' && r.email.toLowerCase() === val) return true;
                        if (type === 'phone' && String(r.phone) === val) return true;
                    }
                    // Check team members if they exist
                    if (r.teamMembersByEvent && r.teamMembersByEvent[eventName]) {
                        return r.teamMembersByEvent[eventName].members.some(m => {
                            if (type === 'email' && m.email.toLowerCase() === val) return true;
                            if (type === 'phone' && String(m.phone) === val) return true;
                            return false;
                        });
                    }
                    return false;
                });

                if (conflictReg) {
                    group.classList.add('has-error');
                    const isPaid = conflictReg.paymentStatus === 'Paid' || conflictReg.paymentStatus === 'Verification Required';

                    if (!isPaid) {
                        errEl.innerHTML = `⚠️ This ${type} is already registered but unpaid. <br/>
                            <button type="button" onclick="resumeUnpaidPayment('${conflictReg.regId}')" 
                                style="background:var(--emirates-red); border:none; color:white; padding:4px 10px; border-radius:4px; margin-top:5px; cursor:pointer; font-size:12px;">
                                💳 Resume Payment for ${conflictReg.regId}
                            </button>`;
                    } else {
                        errEl.textContent = `⚠️ This ${type === 'email' ? 'email' : 'phone'} is already registered and confirmed for ${eventName}`;
                    }
                    return false;
                }
                */


                group.classList.remove('has-error');
                if (errEl) errEl.textContent = `Please enter valid ${type}`;
                return true;
            }

            // Team name duplicate check — runs only on submit using already-loaded data.
            // REMOVED live Firestore reads: they were firing getRegistrations() on every keystroke
            // after the first reg cleared the cache, flooding Firebase's connection queue
            // and making the second registration's write hang indefinitely.
            function checkTeamNameDuplicateLocal(sectionPrefix, allSectionData) {
                const input = document.getElementById(`teamName_${sectionPrefix}`);
                const group = document.getElementById(`teamNameGroup_${sectionPrefix}`);
                const errEl = document.getElementById(`teamNameError_${sectionPrefix}`);
                if (!input || !group) return true;
                const val = input.value.trim();
                if (!val) {
                    group.classList.add('has-error');
                    if (errEl) errEl.textContent = 'Please enter a team name';
                    return false;
                }
                group.classList.remove('has-error');
                return true;
            }

            /* ── Validation helpers ── */
            function validateField(id, groupId, ok) {
                const g = document.getElementById(groupId);
                if (!ok) { g.classList.add('has-error'); return false; }
                g.classList.remove('has-error'); return true;
            }
            function validateFood(prefix, groupId) {
                const c = document.querySelector(`input[name="food_${prefix}"]:checked`);
                const g = document.getElementById(groupId);
                if (!c) { g.classList.add('has-error'); return null; }
                g.classList.remove('has-error'); return c.value;
            }

            /* ── Submit ── */
            async function submitForm(e) {
                e.preventDefault();

                // Block submission if opened via file:// — Firebase won't work
                if (window.location.protocol === 'file:') {
                    alert("⚠️ This page is opened directly from your folder (file:// protocol).\n\nFirebase cannot connect in this mode. Please use a live server (e.g. VS Code Live Server, or host on Netlify) to register.");
                    return;
                }

                // Block if Firebase DB is not ready
                if (!window.db) {
                    alert("⚠️ Firebase is not ready yet. Please wait a moment and try again, or reload the page.");
                    return;
                }

                // Rate Limiting: 3s window prevents accidental double-clicks only
                const lastAttempt = localStorage.getItem('lastRegAttempt');
                if (lastAttempt && Date.now() - parseInt(lastAttempt) < 3000) {
                    alert('Please wait a moment before trying again.');
                    return;
                }

                const submitBtn = document.getElementById('submitBtn');
                if (!submitBtn || submitBtn.disabled) return; // Prevent double submission

                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Saving...';

                // Safety Timeout: re-enable button if it takes more than 35s
                const submissionTimeout = setTimeout(() => {
                    if (submitBtn.disabled && submitBtn.textContent.includes('Saving')) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Proceed to Payment';
                        alert("⚠️ Saving is taking longer than expected (>35s). Please check your internet connection and try again. If the issue persists, contact support.");
                    }
                }, 35000);

                // Removed redundant fetch as DB duplicate checks are now disabled
                let existingRegistrations = [];

                let valid = true;

                const college = document.getElementById('college').value.trim();
                const startingLocation = document.getElementById('startingLocation').value.trim();
                if (!validateField('college', 'collegeGroup', college)) valid = false;
                if (!validateField('startingLocation', 'locationGroup', startingLocation)) valid = false;

                const allSectionData = [];
                const globalEmails = new Set();

                for (let idx = 0; idx < eventsArr.length; idx++) {
                    const ev = eventsArr[idx];
                    const sectionPrefix = `evSection_${idx}`;
                    const sectionData = { event: ev.event, teamSize: ev.teamSize, members: [] };

                    const isIdeaForge = ev.event.toLowerCase() === 'idea forge' || ev.event.toLowerCase() === 'ideaforge';
                    if (isIdeaForge) {
                        const domEl = document.getElementById(`domain_${sectionPrefix}`);
                        sectionData.domain = domEl ? domEl.value : 'Emerging technology';
                    }

                    const isTeamEventNotChess = ev.teamSize > 1 && ev.event.toLowerCase() !== 'chess';
                    if (isTeamEventNotChess) {
                        const tnEl = document.getElementById(`teamName_${sectionPrefix}`);
                        const tnVal = tnEl ? tnEl.value.trim() : '';
                        if (!validateField(`teamName_${sectionPrefix}`, `teamNameGroup_${sectionPrefix}`, tnVal)) valid = false;
                        sectionData.teamName = tnVal;
                    }

                    for (let i = 1; i <= ev.teamSize; i++) {
                        const mPrefix = `${sectionPrefix}_m${i}`;
                        const mn = document.getElementById(`${mPrefix}_name`).value.trim();
                        const me = document.getElementById(`${mPrefix}_email`).value.trim();
                        const mp = document.getElementById(`${mPrefix}_phone`).value.trim();
                        const mf = validateFood(mPrefix, `foodGroup_${mPrefix}`);
                        const mh = document.getElementById(`hostelInput_${mPrefix}`).value;

                        if (!validateField(`${mPrefix}_name`, `${mPrefix}_nameGroup`, mn)) valid = false;
                        if (!validateField(`${mPrefix}_email`, `${mPrefix}_emailGroup`, me && emailRx.test(me))) valid = false;
                        if (!validateField(`${mPrefix}_phone`, `${mPrefix}_phoneGroup`, mp && phoneRx.test(mp))) valid = false;
                        if (!mf) valid = false;

                        // Extra cross-check on submit using cached data
                        const emailOk = await validateMemberContact(mPrefix, sectionPrefix, ev.event, 'email', existingRegistrations);
                        const phoneOk = await validateMemberContact(mPrefix, sectionPrefix, ev.event, 'phone', existingRegistrations);
                        if (!emailOk || !phoneOk) valid = false;

                        sectionData.members.push({ name: mn, email: me, phone: mp, food: mf || '', hostel: mh });
                        if (me) globalEmails.add(me.toLowerCase());
                    }
                    allSectionData.push(sectionData);
                }

                if (!valid) {
                    clearTimeout(submissionTimeout);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Proceed to Payment';
                    return;
                }

                localStorage.setItem('lastRegAttempt', Date.now().toString());

                try {
                    const feeInfo = getFeeInfo();
                    const regId = await generateRegId();

                    // Root data for compatibility
                    const firstMember = allSectionData[0].members[0];
                    const teamMembersByEvent = {};
                    allSectionData.forEach(sd => {
                        teamMembersByEvent[sd.event] = { 
                            teamName: sd.teamName || '', 
                            members: sd.members,
                            domain: sd.domain || ''
                        };
                    });

                    const regPayload = {
                        regId,
                        name: firstMember.name,
                        email: firstMember.email,
                        phone: firstMember.phone,
                        food: firstMember.food || '',
                        hostel: firstMember.hostel || 'No',
                        college: college,
                        startingLocation: startingLocation,
                        verifiedViaGoogle: window.isVerified || false,
                        event: eventsArr.map(e => e.event).join(', '),
                        events: eventsArr.map(e => ({
                            event: e.event,
                            participationMode: e.teamSize > 1 ? `Team of ${e.teamSize}` : 'Individual',
                            teamSize: e.teamSize
                        })),
                        teamMembersByEvent,
                        members: allSectionData.flatMap(s => s.members),
                        teamSize: feeInfo.unique,
                        amount: feeInfo.totalFee,
                        paymentStatus: 'Pending',
                        registeredAt: new Date().toISOString()
                    };

                    await addRegistration(regPayload);

                    clearTimeout(submissionTimeout);
                    sessionStorage.setItem('currentRegId', regId);
                    sessionStorage.setItem('currentRegData', JSON.stringify(regPayload)); // For immediate UI access
                    
                    // Trigger automated email (Failsafe: don't block registration if email fails)
                    try {
                        await sendAutomatedEmail(EMAILJS_TEMPLATE_REGISTRATION, regPayload);
                    } catch (emailError) {
                        console.error("[EmailJS] Registration email failed to send, but registration was saved:", emailError);
                    }

                    window.location.href = 'payment.html';
                } catch (error) {
                    clearTimeout(submissionTimeout);
                    console.error("Submission failed:", error);
                    let errMsg = "⚠️ Registration failed. Please try again.";
                    if (error.message === 'WRITE_TIMEOUT' || (error.message && error.message.includes('timeout'))) {
                        errMsg = "⚠️ Could not reach the server in time.\n\nPlease check your internet and tap 'Proceed to Payment' again.";
                    } else if (error.code === 'permission-denied') {
                        errMsg = "⚠️ Permission Denied. The database is blocking this registration. Please contact support.";
                    } else if (error.message && error.message.includes('Firebase not initialized')) {
                        errMsg = "⚠️ Firebase is not loaded yet. Please reload the page and try again.";
                    } else if (error.message && error.message.includes('Time conflict')) {
                        errMsg = "⚠️ Two of your selected events clash in schedule. Please go back and choose non-conflicting events.";
                    }
                    alert(errMsg + "\n\nDetails: " + (error.message || error) + "\n\n(Code Version: 1.1)\nIf this persists, please try clearing your browser cache.");
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Proceed to Payment';
                }
            }

            buildForm();

            // ── Back-navigation button-reset fix ──
            // When the user submits successfully and navigates to payment.html,
            // then presses the browser back button, the button may remain in its
            // disabled "⏳ Saving..." state. We use THREE mechanisms to cover
            // all browser behaviors (bfcache, full reload, mobile tab switch):
            function resetSubmitButton() {
                const submitBtn = document.getElementById('submitBtn');
                if (submitBtn && (submitBtn.disabled || submitBtn.textContent.includes('Saving'))) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Proceed to Payment';
                }
            }

            // 1. pageshow — fires when page is restored from bfcache
            window.addEventListener('pageshow', function (event) {
                if (event.persisted) {
                    resetSubmitButton();
                }
                // Also reset after a tiny delay in case DOM isn't fully restored yet
                setTimeout(resetSubmitButton, 100);
            });

            // 2. visibilitychange — fires when tab becomes visible again (mobile)
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                    resetSubmitButton();
                }
            });

            // 3. focus — fires when the window regains focus (desktop back-nav)
            window.addEventListener('focus', resetSubmitButton);

            // 4. Immediate check — covers the case where the IIFE re-runs on full reload
            //    but the browser pre-fills the form with stale DOM state
            setTimeout(resetSubmitButton, 0);
        })();
    </script>
    <script>
        // ── Dynamic Site Config (CMS) ──
        (function loadPublicConfig() {
            const waitForDb = (cb, n=25) => {
                if (window.db) cb();
                else if (n > 0) setTimeout(() => waitForDb(cb, n - 1), 200);
            };
            waitForDb(async () => {
                try {
                    const fetchOp = window.db.collection('settings').doc('publicConfig').get();
                    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), 3000));
                    const doc = await Promise.race([fetchOp, timeout]);
                    
                    if (doc.exists) {
                        const data = doc.data();
                        
                        // 1. Maintenance Mode
                        if (data.maintenanceMode === true) {
                            const overlay = document.createElement('div');
                            overlay.id = 'maintenanceOverlay';
                            overlay.innerHTML = `
                                <div style="position:fixed;inset:0;z-index:999999;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;text-align:center;padding:40px;">
                                    <div style="font-size:4rem;margin-bottom:20px;">🔧</div>
                                    <h1 style="font-family:'Cinzel',serif;font-size:2rem;margin-bottom:16px;color:#ffd700;">Under Maintenance</h1>
                                    <p style="font-size:1.1rem;color:rgba(255,255,255,0.8);max-width:500px;line-height:1.6;">We are performing scheduled updates. Please check back soon!</p>
                                </div>`;
                            document.body.innerHTML = '';
                            document.body.appendChild(overlay);
                            return;
                        }

                        // 2. Registrations Locked
                        if (data.registrationOpen === false) {
                            const overlay = document.createElement('div');
                            overlay.id = 'registrationLockedOverlay';
                            overlay.innerHTML = `
                                <div style="position:fixed;inset:0;z-index:999999;background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;text-align:center;padding:40px;">
                                    <div style="font-size:4rem;margin-bottom:20px;">🔒</div>
                                    <h1 style="font-family:'Cinzel',serif;font-size:2rem;margin-bottom:16px;color:#ffd700;">Registrations Closed</h1>
                                    <p style="font-size:1.1rem;color:rgba(255,255,255,0.8);max-width:500px;line-height:1.6;">Online registrations for Elexsiya 26 are currently closed or have ended.</p>
                                    <button onclick="window.location.href='index.html'" style="margin-top:24px;background:var(--emirates-red, #c60c30);color:white;border:none;padding:12px 24px;border-radius:4px;font-weight:700;cursor:pointer;font-size:1rem;">Return Home</button>
                                </div>`;
                            document.body.appendChild(overlay);
                            
                            // Disable the submit button just in case
                            const submitBtn = document.getElementById('submitBtn');
                            if (submitBtn) submitBtn.disabled = true;
                        }
                    }
                } catch (e) {
                    console.warn('Public config load failed:', e);
                }
            });
        })();
    </script>
